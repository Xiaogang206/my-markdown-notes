name: Sync to Public Pages Repo

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: Xiaogang206/gang
          token: ${{ secrets.PUBLISH_TOKEN }}
          path: public

      - name: Generate index.md and categories.md
        run: |
          echo "# 我的笔记索引" > index.md
          echo "" >> index.md
          echo "## 分类" >> index.md
          echo "- [分类目录](./categories.md)" >> index.md

          echo "# 分类目录" > categories.md
          echo "" >> categories.md

          declare -A category_map

          for file in *.md */*.md; do
            if [ "$file" != "index.md" ] && [ "$file" != "categories.md" ]; then
              category=$(grep -m1 "^category:" "$file" | sed 's/category:[ ]*//')
              if [ -z "$category" ]; then
                category="未分类"
              fi
              category_map["$category"]+="$file "
            fi
          done

          for cat in "${!category_map[@]}"; do
            echo "## $cat" >> categories.md
            echo "" >> categories.md
            for f in ${category_map[$cat]}; do
              echo "- [$f](./$f)" >> categories.md
            done
            echo "" >> categories.md
          done

      - name: Sync markdown files
        run: |
          rm -rf public/*
          cp -r *.md public/ || true
          cp -r */ public/ || true
          rm -rf public/public

      - name: Commit and push changes (force rebuild)
        run: |
          cd public
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto sync + auto index + auto categories (no structure change)" --allow-empty
          git push
