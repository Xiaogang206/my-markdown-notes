name: Sync to Public Pages Repo

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须为 0 才能获取全量 git log 生成时间线

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: Xiaogang206/gang
          token: ${{ secrets.PUBLISH_TOKEN }}
          path: public

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Build Assets
        run: |
          # 执行 Python 脚本生成索引和分类
          python build_assets.py
          
          # 快速生成简单的 search.md (不再内嵌 JS，保持文件纯净)
          cat << 'EOF' > search.md
          # 全文搜索
          <input id="searchBox" placeholder="输入关键词搜索..." style="width:100%;padding:8px">
          <ul id="results"></ul>
          <script src="./search_logic.js"></script>
          EOF

      - name: Sync Files
        run: |
          # 清理旧文件并同步新文件
          mkdir -p public
          find . -maxdepth 1 -name "*.md" -exec cp {} public/ \;
          find . -maxdepth 1 -name "*.json" -exec cp {} public/ \;
          # 如果你有其他 JS 或静态资源
          cp -r assets/* public/ 2>/dev/null || true

      - name: Commit and Push
        run: |
          cd public
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Site Update: $(date +'%Y-%m-%d %H:%M')" --allow-empty
          git push
